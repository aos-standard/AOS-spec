name: AOS Compliance Check
description: >-
  Validate AOS-v0.1 zone declarations and blast-radius divergences with MCP Blast-Radius Auditor.
  Non-compliant manifests or divergences fail CI (exit 1).
inputs:
  target-dir:
    description: Repository root or agent directory to scan
    required: false
    default: "."
  package-version:
    description: Version pin for mcp-blast-radius (e.g. ==0.2.0)
    required: false
    default: "==0.2.0"
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - shell: bash
      run: |
        set -euo pipefail
        pip install "mcp-blast-radius${{ inputs.package-version }}"
        mcp-blast-radius-gate --gate-mode blocking --target-dir "${{ inputs.target-dir }}"
      env:
        AOS_VALIDATOR_CALLER: ci
